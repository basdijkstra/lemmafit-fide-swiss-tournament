entries:
  - id: spec-001
    req_id: null
    title: Participant count is between 2 and 19 when tournament is active or finished
    group: Tournament Setup
    layer: logic
    type: invariant
    property: "m.phase != Setup ==> 2 <= |m.participants| <= 19"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-002
    req_id: null
    title: Total rounds is at least 1 when tournament is active or finished
    group: Tournament Setup
    layer: logic
    type: invariant
    property: "m.phase != Setup ==> m.totalRounds >= 1"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-003
    req_id: null
    title: Current round count never exceeds total rounds
    group: Tournament Setup
    layer: logic
    type: invariant
    property: "CurrentRound(m) <= m.totalRounds"
    module: AppCore
    depends_on: [spec-001, spec-002]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-004
    req_id: null
    title: Participants have non-negative scores at all times
    group: Scoring
    layer: logic
    type: invariant
    property: "forall i :: 0 <= i < |m.participants| ==> m.participants[i].score2x >= 0"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-005
    req_id: null
    title: Opponent tracking is symmetric across all participants (FIDE Rule 2 foundation)
    group: Pairing Rules
    layer: logic
    type: invariant
    property: "OpponentsSymmetric(m.participants)"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-006
    req_id: null
    title: Accepted round pairings contain no rematches between participants (FIDE Rule 2)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ValidPairingsForModel(m, pairings, bye) ==> NoRematchPairings(m.participants, pairings)"
    module: AppCore
    depends_on: [spec-005]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-007
    req_id: null
    title: Each participant appears at most once in accepted round pairings (FIDE Rule 3)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ValidPairingsForModel(m, pairings, bye) ==> PairingsDistinct(pairings)"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-008
    req_id: null
    title: A bye is present when and only when the participant count is odd (FIDE Rule 3)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ValidPairingsForModel(m, pairings, bye) ==> (bye.Some? <==> |m.participants| % 2 == 1)"
    module: AppCore
    depends_on: [spec-001]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-009
    req_id: null
    title: Accepted bye recipient has not previously received a pairing-allocated bye (FIDE Rule 4)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ValidPairingsForModel(m, pairings, bye) && bye.Some? ==> !m.participants[bye.value].byeReceived"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-010
    req_id: null
    title: Active round always has structurally valid pairings and valid participant indices
    group: Pairing Rules
    layer: logic
    type: invariant
    property: "ActiveRoundValid(m)"
    module: AppCore
    depends_on: [spec-001]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-011
    req_id: null
    title: Color history length equals total games played as white plus black for every participant
    group: Pairing Rules
    layer: logic
    type: invariant
    property: "forall i :: 0 <= i < |m.participants| ==> |m.participants[i].colorHistory| == m.participants[i].whiteCount + m.participants[i].blackCount"
    module: AppCore
    depends_on: []
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-012
    req_id: null
    title: Color difference for every participant stays within minus 2 to 2 (FIDE Rule 6)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ChooseColorsPreservesColorDiff(p1, p2) ==> -2 <= ColorDiff(ApplyColor(p, c)) <= 2"
    module: AppCore
    depends_on: [spec-011]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-013
    req_id: null
    title: No participant receives the same color three times consecutively (FIDE Rule 7)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "NoThreeConsecutive(p.colorHistory) && c != LastColor(p) ==> NoThreeConsecutive(p.colorHistory + [c])"
    module: AppCore
    depends_on: [spec-011]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-014
    req_id: null
    title: All accepted pairings cover every participant exactly once (bye or paired)
    group: Pairing Rules
    layer: logic
    type: postcondition
    property: "ValidPairingsForModel(m, pairings, bye) ==> 2 * |pairings| + (if bye.Some? then 1 else 0) == |m.participants|"
    module: AppCore
    depends_on: [spec-001, spec-007, spec-008]
    verifiable: true
    guarantee_type: verified
    state: ADDRESSED

  - id: spec-015
    req_id: null
    title: Tournament setup screen allows entering participant names and number of rounds
    group: Presentation
    layer: presentation
    type: invariant
    property: "Setup phase renders a form for participant names and a round count selector"
    module: null
    depends_on: []
    verifiable: false
    guarantee_type: trusted
    state: null

  - id: spec-016
    req_id: null
    title: Pairings view shows White vs Black participant names for each game in the active round
    group: Presentation
    layer: presentation
    type: invariant
    property: "Active round screen displays each pairing as white-player vs black-player"
    module: null
    depends_on: []
    verifiable: false
    guarantee_type: trusted
    state: null

  - id: spec-017
    req_id: null
    title: User can record game results as White wins, Black wins, or Draw for each pairing
    group: Presentation
    layer: presentation
    type: invariant
    property: "Result entry UI shows WhiteWins, BlackWins, Draw buttons per pairing"
    module: null
    depends_on: []
    verifiable: false
    guarantee_type: trusted
    state: null

  - id: spec-018
    req_id: null
    title: Standings table displays all participants sorted by score descending after each round
    group: Presentation
    layer: presentation
    type: invariant
    property: "Standings shows rank, name, and score for all participants in descending score order"
    module: null
    depends_on: []
    verifiable: false
    guarantee_type: trusted
    state: null
